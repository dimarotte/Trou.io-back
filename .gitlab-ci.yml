image: node

stages:
  - lint
  - docker

cache:
  key: node_modules
  paths:
    - node_modules/

eslint:
  stage: lint
  script: 
    - npm i eslint
    - npx eslint .
  only:
    - merge_requests
    - pushes

backend_docker:
  stage: docker
  image: docker:28
  services:
    - name: docker:28-dind
  variables:
    # Optimize Docker performance
    DOCKER_DRIVER: overlay2
    DOCKER_BUILDKIT: "1"
    DOCKER_CLI_EXPERIMENTAL: enabled
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
    - docker buildx create --use
  script:
    - |
      # Generate version tags
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}

      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg NG_CONFIG=production \
        --tag "$CI_REGISTRY_IMAGE/frontend:dev" \
        --tag "$CI_REGISTRY_IMAGE/frontend:$VERSION" \
        --tag "$CI_REGISTRY_IMAGE/frontend:${CI_COMMIT_BRANCH}" \
        --push \
        .
  needs: [lint]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

  